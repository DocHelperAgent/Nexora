<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Chat Agent</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="chat-container">
        <div id="status-bar">
            <span id="status-text">Ready</span>
            <button id="reset-btn" title="Reset Chat">🔄</button>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="chat-input" placeholder="Type a message...">
            <button id="mic-btn">🎤</button>
            <button id="send-btn">Send</button>
        </div>
    </div>
    <div id="threejs-container"></div>
    <script src="https://unpkg.com/three@0.148.0/build/three.min.js" crossorigin="anonymous"></script>
    <script>
        if (typeof THREE === 'undefined') {
            console.log('Unpkg failed, trying jsDelivr...');
            var script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/three@0.148.0/build/three.min.js";
            document.head.appendChild(script);
        }
    </script>
    <script src="config.js?v=1.0.3"></script>
    <script src="app.js?v=1.0.3"></script>
</body>
</html>
